<!DOCTYPE html>
<html>
    <head>
        <title>View Books</title>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
        <style>
            body {
                padding: 20px;
            }
            h1 {
                margin-bottom: 30px;
            }
            #createUpdateForm {
                background-color: #f5f5f5;
                padding: 20px;
                border-radius: 5px;
                margin-top: 20px;
            }
            #createUpdateForm input {
                margin-bottom: 10px;
            }
            .table-responsive {
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Books Management System</h1>
            
            <div> 
                <button id="showCreateButton" class="btn btn-primary" onclick="showCreate()">Create New Book</button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover" id="bookTable">
                    <thead class="thead-dark">
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
            
            <div id='createUpdateForm' style="display: none">
                <h2>
                    <span id="createLabel">Create a New Book</span>
                    <span id="updateLabel" style="display: none">Update Book</span>
                </h2>
                <form id="bookForm">
                    <div class="form-group">
                        <label for="id">ID (Auto-generated)</label>
                        <input type="hidden" id="id" name="id"/>
                    </div>
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required/>
                    </div>
                    <div class="form-group">
                        <label for="author">Author</label>
                        <input type="text" class="form-control" id="author" name="author" required/> 
                    </div>
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" class="form-control" id="price" name="price" required/>
                    </div>
                    <div>
                        <button type="button" id="doCreateButton" class="btn btn-success" onclick="doCreate()">Create</button>
                        <button type="button" id="doUpdateButton" class="btn btn-warning" style="display: none;" onclick="doUpdate()">Update</button>
                        <button type="button" class="btn btn-secondary" onclick="showViewAll()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
        
        <script src="app.js"></script>
    </body>
</html>
